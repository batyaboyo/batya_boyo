<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff41;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#008f11;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Hexagon Background -->
  <polygon points="50,5 95,27.5 95,72.5 50,95 5,72.5 5,27.5" fill="#000000" stroke="url(#grad)" stroke-width="5"/>
  
  <!-- Letter B -->
  <text x="50" y="65" font-family="monospace" font-size="50" font-weight="bold" fill="url(#grad)" text-anchor="middle">B</text>
  
  <!-- Cyber Dot -->
  <circle cx="80" cy="80" r="8" fill="#00ff41" />
</svg>
